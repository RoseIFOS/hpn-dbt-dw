name: Claude Code Review

# Review automatico em toda PR para main.
# Requer: GitHub App da Claude instalado no repo + secret ANTHROPIC_API_KEY.
on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Claude review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Revise esta PR de um projeto dbt (Snowflake). Foque em:

            1. **dbt / modelagem**
               - Modelos usam `{{ ref() }}`/`{{ source() }}` (sem schema hardcoded).
               - Materializacao coerente (view em staging/intermediate, table em marts).
               - Grao, joins e chaves corretos; risco de fan-out/duplicacao.

            2. **Testes e qualidade**
               - Colunas-chave com `unique`/`not_null`; relationships entre fato e dim.
               - Seeds com properties/testes declarados.

            3. **CI/CD e seguranca**
               - Workflows nao expoem segredos; targets/schemas corretos por ambiente.

            4. **SQL**
               - Legibilidade, CTEs claras, performance (evitar scans/joins desnecessarios).

            Deixe comentarios inline nos pontos especificos e um comentario de topo
            com o resumo. Seja objetiva e priorize o que importa.

          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
