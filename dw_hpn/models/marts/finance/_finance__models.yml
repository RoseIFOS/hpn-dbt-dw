version: 2

models:
  - name: fct_finance
    description: "Fato financeiro (DRE) no grão de lançamento. Inclui signed_amount (amount x sign) para simplificar a apuração no Power BI."
    columns:
      - name: finance_key
        description: "Chave única do lançamento financeiro"
        tests:
          - unique
          - not_null
      - name: transaction_date
        description: "Data da transação (FK para dim_date)"
        tests:
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_day
      - name: account_key
        description: "Chave da conta (FK para dim_account)"
        tests:
          - relationships:
              arguments:
                to: ref('dim_account')
                field: account_key
      - name: organization_key
        description: "Chave da organização (FK para dim_organization)"
        tests:
          - relationships:
              arguments:
                to: ref('dim_organization')
                field: organization_key
      - name: department_group_key
        description: "Chave do grupo de departamento (FK para dim_department_group)"
        tests:
          - relationships:
              arguments:
                to: ref('dim_department_group')
                field: department_group_key
      - name: scenario
        description: "Cenário do lançamento (Actual, Budget, etc.)"
      - name: amount
        description: "Valor do lançamento (sem sinal)"
      - name: sign
        description: "Sinal contábil da conta (+1/-1)"
      - name: signed_amount
        description: "Valor com sinal contábil aplicado (amount x sign)"

  - name: dim_account
    description: "Dimensão de conta contábil (exclusiva do financeiro)."
    columns:
      - name: account_key
        description: "Chave de negócio única da conta"
        tests:
          - unique
          - not_null
      - name: account_header_key
        description: "Chave do cabeçalho de conta (FK para dim_account_header)"
        tests:
          - relationships:
              arguments:
                to: ref('dim_account_header')
                field: account_header_key
      - name: account_name
        description: "Nome da conta"
      - name: account_type
        description: "Tipo da conta"
      - name: sign
        description: "Sinal contábil (+1/-1)"

  - name: dim_account_header
    description: "Dimensão de cabeçalho de conta (exclusiva do financeiro)."
    columns:
      - name: account_header_key
        description: "Chave de negócio única do cabeçalho de conta"
        tests:
          - unique
          - not_null
      - name: account_header_name
        description: "Nome do cabeçalho de conta"

  - name: dim_department_group
    description: "Dimensão de grupo de departamento (exclusiva do financeiro)."
    columns:
      - name: department_group_key
        description: "Chave de negócio única do grupo de departamento"
        tests:
          - unique
          - not_null
      - name: department_group_name
        description: "Nome do grupo de departamento"

  - name: dim_organization
    description: "Dimensão de organização (exclusiva do financeiro)."
    columns:
      - name: organization_key
        description: "Chave de negócio única da organização"
        tests:
          - unique
          - not_null
      - name: organization_name
        description: "Nome da organização"
      - name: parent_organization_name
        description: "Nome da organização pai"
